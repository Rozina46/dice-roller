<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Roller</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#e8babe;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
}
.box{
    text-align:center;
    background:#e48383;
    padding:40px;
    border-radius:20px;
    position: relative;
    margin-left: 350px;
}
img{
    width:120px;
    margin:20px 0;
}
button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#ae3648;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
button:hover{
    background-color: #d2b4a7;
}
h2{
    color:rgb(235, 245, 249);
    font-size: 50px;
    position: absolute;
    left: 120px;
    top: 200px; 
    text-align: left;
}
</style>
</head>

<body>
<h2>Welcome to My mini <br>Project</h2>
<div class="box">
    <h1>Dice Roller</h1>

    <img id="dice" 
    src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Dice-1-b.svg" alt="Dice">

    <p id="text">Click and roll the dice</p>

    <button onclick="diceroll()">Roll Dice</button>
</div>

<script>
function diceroll(){
    let value = Math.floor(Math.random()*6)+1;

    const diceImages = {
        1:"https://upload.wikimedia.org/wikipedia/commons/1/1b/Dice-1-b.svg",
        2:"https://upload.wikimedia.org/wikipedia/commons/5/5f/Dice-2-b.svg",
        3:"https://upload.wikimedia.org/wikipedia/commons/b/b1/Dice-3-b.svg",
        4:"https://upload.wikimedia.org/wikipedia/commons/f/fd/Dice-4-b.svg",
        5:"https://upload.wikimedia.org/wikipedia/commons/0/08/Dice-5-b.svg",
        6:"https://upload.wikimedia.org/wikipedia/commons/2/26/Dice-6-b.svg"
    };

    document.getElementById("dice").src = diceImages[value];
    document.getElementById("text").innerText =
        "You rolled: " + value;
}
</script>

</body>
</html>
